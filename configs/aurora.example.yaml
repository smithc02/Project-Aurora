# Copy to an untracked user configuration file before use. This is a valid,
# hardware-free example; integrations stay disabled until explicitly enabled.
# Precedence: command line, environment variables, YAML, then safe defaults.
application:
  name: "Project Aurora"
  configuration_profile: "example"
logging:
  level: "INFO"
hyperhdr:
  enabled: false
  validation_timeout_seconds: 2.0
wled:
  enabled: false
  validation_timeout_seconds: 2.0
ddp:
  enabled: false
capture_device:
  enabled: false
  # identifier: "/dev/video0"
lighting_zones: []
# Set orientation and starting_corner only after physical installation.
led_layout: {}
mqtt:  # Reserved for future automation and telemetry; never real-time frames.
  enabled: false
# Read-only WLED validation uses GET /json/info only when explicitly invoked.
# wled.validation_timeout_seconds defaults to 2.0 seconds (0.1–10.0).
# Read-only HyperHDR validation uses GET /json-rpc serverinfo only when explicitly invoked.
