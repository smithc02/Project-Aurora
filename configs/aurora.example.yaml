# Copy to an untracked user configuration file before use. This is a valid,
# hardware-free example; integrations stay disabled until explicitly enabled.
# Precedence: command line, environment variables, YAML, then safe defaults.
application:
  name: "Project Aurora"
  configuration_profile: "example"
logging:
  level: "INFO"
hyperhdr:
  enabled: false
wled:
  enabled: false
ddp:
  enabled: false
capture_device:
  enabled: false
lighting_zones: []
led_layout:
  # Set orientation and starting_corner only after physical installation.
mqtt:  # Reserved for future automation and telemetry; never real-time frames.
  enabled: false
