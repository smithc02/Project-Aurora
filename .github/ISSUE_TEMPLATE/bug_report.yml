name: Bug report
description: Report reproducible software or documentation behavior.
title: "bug: "
labels: [bug]
body:
  - type: textarea
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: Exclude secrets, personal information, and private addresses.
